name: LibrePods-L2CAP-airbrige-WITH-module

on:
  push:
    branches:
      - '*'
    paths:
      - 'android/**'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a nightly release'
        required: true
        type: boolean
        default: false
      custom_notes:
        description: "Custom updates to add to What's Changed section"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK with log capture
        working-directory: android
        run: |
          mkdir -p build-logs
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tee build-logs/log.txt

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Debug APK
          path: android/app/build/outputs/apk/**/*.apk

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        with:
          name: Build Log
          path: android/build-logs/log.txt

  release:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success' && github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: Debug APK

      - uses: actions/download-artifact@v4
        with:
          name: Build Log
          path: ./logs

      - name: Rename APK
        run: |
          APK_PATH=$(find . -name "*.apk" | head -n 1)
          mv "$APK_PATH" "./LibrePods-${{ github.sha }}.apk"

      - name: Build Magisk module
        run: chmod +x build-magisk-module.sh && ./build-magisk-module.sh

      - name: Create nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view nightly && gh release delete nightly -y --cleanup-tag || true
          gh release create nightly "./LibrePods-${{ github.sha }}.apk" "./btl2capfix.zip" "./logs/log.txt" \
            -p -t "Nightly Release"