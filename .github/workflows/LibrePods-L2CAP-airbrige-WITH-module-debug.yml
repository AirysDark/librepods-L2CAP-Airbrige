name: LibrePods Professional CI

on:
  push:
    branches:
      - '*'
    paths:
      - 'android/**'

  workflow_dispatch:
    inputs:
      release_type:
        description: "Choose release type"
        required: true
        type: choice
        options:
          - nightly
          - stable
      version:
        description: "Stable version (required if stable)"
        required: false
        type: string
      custom_notes:
        description: "Additional release notes"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-36"
          sdkmanager "build-tools;36.0.0"
          yes | sdkmanager --licenses

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate CI version metadata
        run: |
          DATE=$(date +"%Y.%m.%d")
          TIME=$(date +"%H%M")
          BUILD=${{ github.run_number }}

          if [ "${{ github.event.inputs.release_type }}" = "stable" ]; then
            if [ -z "${{ github.event.inputs.version }}" ]; then
              echo "Stable release requires version input."
              exit 1
            fi
            VERSION_NAME="${{ github.event.inputs.version }}"
          else
            VERSION_NAME="nightly-${DATE}-${TIME}"
          fi

          echo "CI_VERSION_CODE=$BUILD" >> $GITHUB_ENV
          echo "CI_VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Build Debug APK
        run: |
          chmod +x android/gradlew
          ./android/gradlew --project-dir android \
            assembleDebug \
            -PciVersionCode=$CI_VERSION_CODE \
            -PciVersionName=$CI_VERSION_NAME

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Decode Keystore (Stable Only)
        if: github.event.inputs.release_type == 'stable'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          echo "KEYSTORE_FILE=$PWD/keystore.jks" >> $GITHUB_ENV
          echo "CI=true" >> $GITHUB_ENV

      - name: Build Signed Release APK (Stable Only)
        if: github.event.inputs.release_type == 'stable'
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./android/gradlew --project-dir android \
            assembleRelease \
            -PciVersionCode=$CI_VERSION_CODE \
            -PciVersionName=$CI_VERSION_NAME

      - name: Upload Release APK
        if: github.event.inputs.release_type == 'stable'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Build Magisk Module
        run: |
          chmod +x build-magisk-module.sh
          ./build-magisk-module.sh

      - name: Upload Magisk Module
        uses: actions/upload-artifact@v4
        with:
          name: magisk-module
          path: btl2capfix.zip


  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      # ✅ FIX: Checkout repo with full history
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Generate Tag + Name
        run: |
          BUILD=${{ github.run_number }}
          DATE=$(date +"%Y.%m.%d")
          TIME=$(date +"%H%M")

          if [ "${{ github.event.inputs.release_type }}" = "stable" ]; then
            TAG="v${{ github.event.inputs.version }}-b${BUILD}"
            NAME="Stable v${{ github.event.inputs.version }} (Build ${BUILD})"
          else
            TAG="nightly-${DATE}-${TIME}-b${BUILD}"
            NAME="Nightly ${DATE} ${TIME} (Build ${BUILD})"
          fi

          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "NAME=$NAME" >> $GITHUB_ENV

      - name: Generate Changelog
        run: |
          echo "## Changes" > CHANGELOG.txt
          git log --pretty=format:"- %s" -n 30 >> CHANGELOG.txt

          if [ -n "${{ github.event.inputs.custom_notes }}" ]; then
            echo "" >> CHANGELOG.txt
            echo "## Additional Notes" >> CHANGELOG.txt
            echo "${{ github.event.inputs.custom_notes }}" >> CHANGELOG.txt
          fi

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" ./artifacts/**/* \
            -t "$NAME" \
            -F CHANGELOG.txt
