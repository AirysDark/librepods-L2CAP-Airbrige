name: LibrePods-L2CAP-airbridge-WITH-module-debug

on:
  push:
    branches:
      - '*'
    paths:
      - 'android/**'
  workflow_dispatch:
    inputs:
      release:
        description: "Create a nightly release"
        required: true
        type: boolean
        default: false
      custom_notes:
        description: "Custom updates to add to What's Changed section"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK with log capture
        working-directory: android
        run: |
          mkdir -p build-logs
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tee build-logs/log.txt

      - name: Locate generated APK
        id: find_apk
        run: |
          APK_PATH=$(find android -type f -name "*debug*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found!"
            exit 1
          fi
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "Found APK at: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ${{ env.APK_PATH }}

      - name: Upload build log artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android/build-logs/log.txt

      - name: Build Magisk module
        run: |
          chmod +x build-magisk-module.sh
          ./build-magisk-module.sh

      - name: Upload Magisk module artifact
        uses: actions/upload-artifact@v4
        with:
          name: magisk-module
          path: btl2capfix.zip

  nightly-release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: ./artifacts

      - name: Download Magisk module
        uses: actions/download-artifact@v4
        with:
          name: magisk-module
          path: ./artifacts

      - name: Download build log
        uses: actions/download-artifact@v4
        with:
          name: build-log
          path: ./artifacts/logs

      - name: Export APK name
        run: echo "APK_NAME=LibrePods-${GITHUB_SHA::7}.apk" >> $GITHUB_ENV

      - name: Prepare release files
        run: |
          APK_PATH=$(find ./artifacts -name "*.apk" | head -n 1)
          MODULE_PATH=$(find ./artifacts -name "btl2capfix.zip" | head -n 1)

          mv "$APK_PATH" "./$APK_NAME"
          mv "$MODULE_PATH" "./btl2capfix.zip"

      - name: Create or update nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view nightly && gh release delete nightly -y --cleanup-tag || true
          gh release create nightly \
            "./$APK_NAME" \
            "./btl2capfix.zip" \
            "./artifacts/logs/log.txt" \
            -p \
            -t "Nightly Release" \
            --generate-notes
