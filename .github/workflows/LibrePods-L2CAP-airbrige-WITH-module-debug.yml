name: LibrePods-L2CAP-airbridge-WITH-module-debug

on:
  push:
    branches:
      - '*'
    paths:
      - 'android/**'
  workflow_dispatch:
    inputs:
      release:
        description: "Create a nightly release"
        required: true
        type: boolean
        default: false
      custom_notes:
        description: "Custom updates to add to What's Changed section"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # 🔥 Build with full log capture (never loses output)
      - name: Build debug APK with full log capture
        working-directory: android
        run: |
          mkdir -p build-logs
          chmod +x gradlew

          set +e
          ./gradlew assembleDebug --stacktrace --info > build-logs/build.log 2>&1
          EXIT_CODE=$?
          set -e

          echo "GRADLE_EXIT_CODE=$EXIT_CODE" >> $GITHUB_ENV
          exit 0

      # ✅ Always upload log even if build fails
      - name: Upload build log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android/build-logs/build.log

      # ❌ Fail job properly if Gradle failed
      - name: Fail job if Gradle failed
        if: env.GRADLE_EXIT_CODE != '0'
        run: |
          echo "Gradle failed. See build-log artifact."
          exit 1

      # Only runs if Gradle succeeded
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/**/*.apk

      - name: Build Magisk module
        run: |
          chmod +x build-magisk-module.sh
          ./build-magisk-module.sh

      - name: Upload Magisk module artifact
        uses: actions/upload-artifact@v4
        with:
          name: magisk-module
          path: btl2capfix.zip


  nightly-release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: ./artifacts

      - uses: actions/download-artifact@v4
        with:
          name: magisk-module
          path: ./artifacts

      - uses: actions/download-artifact@v4
        with:
          name: build-log
          path: ./artifacts/logs

      - name: Export APK name
        run: echo "APK_NAME=LibrePods-${GITHUB_SHA::7}.apk" >> $GITHUB_ENV

      - name: Prepare release files
        run: |
          APK_PATH=$(find ./artifacts -name "*.apk" | head -n 1)
          MODULE_PATH=$(find ./artifacts -name "btl2capfix.zip" | head -n 1)

          mv "$APK_PATH" "./$APK_NAME"
          mv "$MODULE_PATH" "./btl2capfix.zip"

      - name: Create or update nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view nightly && gh release delete nightly -y --cleanup-tag || true
          gh release create nightly \
            "./$APK_NAME" \
            "./btl2capfix.zip" \
            "./artifacts/logs/build.log" \
            -p \
            -t "Nightly Release" \
            --generate-notes
