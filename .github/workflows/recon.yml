name: Ultra Deep Recon (Binary + Native + Gradle)

on:
  workflow_dispatch:

jobs:
  recon:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y tree unzip file binutils

      - name: Run Ultra Deep Scan
        run: |
          REPORT="ultra_recon.txt"
          echo "=========================================" > $REPORT
          echo " ULTRA DEEP RECON REPORT" >> $REPORT
          echo "=========================================" >> $REPORT

          echo -e "\n=== SYSTEM INFO ===" >> $REPORT
          uname -a >> $REPORT
          java -version >> $REPORT 2>&1 || true

          echo -e "\n=== FULL FILE TREE ===" >> $REPORT
          tree -a -L 8 >> $REPORT || true

          echo -e "\n=== GRADLE WRAPPER INFO ===" >> $REPORT
          find . -name "gradle-wrapper.properties" -exec sh -c 'echo "\nFILE: $1"; cat "$1"' _ {} \; >> $REPORT

          echo -e "\n=== SETTINGS.GRADLE CONTENT ===" >> $REPORT
          find . -name "settings.gradle*" -exec sh -c 'echo "\nFILE: $1"; cat "$1"' _ {} \; >> $REPORT

          echo -e "\n=== BUILD.GRADLE CONTENT ===" >> $REPORT
          find . -name "build.gradle*" -exec sh -c 'echo "\nFILE: $1"; cat "$1"' _ {} \; >> $REPORT

          echo -e "\n=== MANIFEST FILES ===" >> $REPORT
          find . -name "AndroidManifest.xml" -exec sh -c 'echo "\nFILE: $1"; cat "$1"' _ {} \; >> $REPORT

          echo -e "\n=== CMAKE FILES ===" >> $REPORT
          find . -name "CMakeLists.txt" -exec sh -c 'echo "\nFILE: $1"; cat "$1"' _ {} \; >> $REPORT

          echo -e "\n=== AAR FILES FOUND ===" >> $REPORT
          find . -name "*.aar" >> $REPORT

          echo -e "\n=== EXTRACTING AAR FILES ===" >> $REPORT
          mkdir aar_extract
          for f in $(find . -name "*.aar"); do
            NAME=$(basename "$f" .aar)
            mkdir -p aar_extract/$NAME
            unzip -q "$f" -d aar_extract/$NAME
            echo "\nAAR: $f" >> $REPORT
            find aar_extract/$NAME -name "*.so" >> $REPORT
          done

          echo -e "\n=== ALL NATIVE LIBS (.so) ===" >> $REPORT
          find . -name "*.so" >> $REPORT

          echo -e "\n=== ELF ARCHITECTURE INFO ===" >> $REPORT
          for f in $(find . -name "*.so"); do
            echo -e "\n$f" >> $REPORT
            file "$f" >> $REPORT
          done

          echo -e "\n=== DUPLICATE NATIVE LIB CHECK ===" >> $REPORT
          find . -name "*.so" | sed 's#.*/##' | sort | uniq -d >> $REPORT

          echo -e "\n=== JAR FILES FOUND ===" >> $REPORT
          find . -name "*.jar" >> $REPORT

          echo -e "\n=== EXTRACTING JAR FILES ===" >> $REPORT
          mkdir jar_extract
          for f in $(find . -name "*.jar"); do
            NAME=$(basename "$f" .jar)
            mkdir -p jar_extract/$NAME
            unzip -q "$f" -d jar_extract/$NAME
            echo "\nJAR: $f" >> $REPORT
            grep -Rni "l2cap" jar_extract/$NAME >> $REPORT || true
            grep -Rni "BluetoothSocket" jar_extract/$NAME >> $REPORT || true
          done

          echo -e "\n=== SOURCE SEARCH: L2CAP ===" >> $REPORT
          grep -Rni "l2cap" . >> $REPORT || true

          echo -e "\n=== SOURCE SEARCH: BluetoothSocket ===" >> $REPORT
          grep -Rni "BluetoothSocket" . >> $REPORT || true

          echo -e "\n=== SOURCE SEARCH: android.bluetooth ===" >> $REPORT
          grep -Rni "android.bluetooth" . >> $REPORT || true

          echo -e "\n=== GRADLE VERSION CHECK ===" >> $REPORT
          if [ -f android/gradlew ]; then
            chmod +x android/gradlew
            ./android/gradlew --version >> $REPORT 2>&1 || true
          fi

          echo -e "\n=== DEPENDENCY TREE (if android exists) ===" >> $REPORT
          if [ -f android/gradlew ]; then
            ./android/gradlew --project-dir android app:dependencies >> $REPORT 2>&1 || true
          fi

          echo -e "\n=========================================" >> $REPORT
          echo " ULTRA RECON COMPLETE" >> $REPORT
          echo "=========================================" >> $REPORT

      - name: Upload Ultra Recon Report
        uses: actions/upload-artifact@v4
        with:
          name: ultra-deep-recon-report
          path: ultra_recon.txt
